version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:///./genesis.db"
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:4173"]'
      DRIFT_API_URL: ""
      DRIFT_API_KEY: ""
      HORIZON_API_URL: ""
      HORIZON_API_KEY: ""
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: "http://localhost:8001"
